<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自动推送音乐播放器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui; }
        body {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f0f2f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 15px;
        }
        .status-bar.connected {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-bar.disconnected {
            background: #fff3e0;
            color: #e65100;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background: #4caf50; }
        .dot.orange { background: #ff9800; }
        .player-box {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .song-info {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
        }
        .song-info .label {
            color: #999;
            font-size: 12px;
        }
        .song-info .name {
            color: #222;
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
        }
        audio {
            width: 100%;
            margin: 12px 0;
            display: block;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.96); }
        .btn-stop {
            background: #e53935;
            color: #fff;
        }
        .btn-stop:hover { background: #c62828; }
        .btn-refresh {
            background: #2563eb;
            color: #fff;
        }
        .btn-refresh:hover { background: #1d4ed8; }
        .log {
            margin-top: 16px;
            padding: 12px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #eee;
        }
        .log .entry {
            padding: 2px 0;
            border-bottom: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>自动推送播放器</h1>
    <p class="subtitle">仅接收后端推送指令，全局控制由AI工具下发</p>

    <div class="status-bar disconnected" id="statusBar">
        <span class="dot orange" id="statusDot"></span>
        <span id="statusText">等待连接...</span>
    </div>

    <div class="player-box">
        <div class="song-info">
            <div class="label">当前推送曲目</div>
            <div class="name" id="songName">等待推送...</div>
        </div>

        <audio id="audioPlayer" controls>

        <div class="btn-row">
            <button class="btn-stop" id="btnStop" onclick="localStopPlay()">本地暂停播放</button>
            <button class="btn-refresh" onclick="location.reload()">刷新重连</button>
        </div>

        <div class="log" id="logBox">
            <div class="entry">等待服务端推送音乐指令</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById("audioPlayer");
        const songNameEl = document.getElementById("songName");
        const statusBar = document.getElementById("statusBar");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const logBox = document.getElementById("logBox");

        let ws = null;
        let currentSongPath = "";

        // 日志打印
        function addLog(msg) {
            const now = new Date().toLocaleTimeString();
            const div = document.createElement("div");
            div.className = "entry";
            div.textContent = `[${now}] ${msg}`;
            logBox.prepend(div);
            if (logBox.children.length > 20) logBox.lastChild.remove();
        }

        // 连接状态切换
        function setWsStatus(connected) {
            if (connected) {
                statusBar.className = "status-bar connected";
                statusDot.className = "dot green";
                statusText.textContent = "WebSocket已就绪 · 监听推送";
            } else {
                statusBar.className = "status-bar disconnected";
                statusDot.className = "dot orange";
                statusText.textContent = "连接断开 · 自动重连中";
            }
        }

        // 加载并播放音频（对接后端文件流接口，下面补充后端文件接口代码）
        function loadAndPlay(songName, songPath) {
            currentSongPath = songPath;
            songNameEl.textContent = songName;
            // 请求后端音频流地址
            const streamUrl = `http://127.0.0.1:8006/api/music_stream?path=${encodeURIComponent(songPath)}`;
            audio.src = streamUrl;
            audio.play()
                .then(() => {
                    addLog(`收到推送，开始播放：${songName}`);
                    statusText.textContent = "正在播放 · 服务端推送曲目";
                })
                .catch(err => {
                    addLog(`播放失败：${err.message}`);
                });
        }

        // 仅本地暂停，不向后端发送任何指令
        function localStopPlay() {
            audio.pause();
            audio.currentTime = 0;
            addLog("手动本地暂停（全局停止请等待AI下发指令）");
            statusText.textContent = "本地已暂停";
        }

        // 建立WebSocket连接，地址严格匹配FastAPI：/ws/music
        function connectWebSocket() {
            // 固定后端服务地址，本地调试写死，部署可动态替换
            const wsUrl = `ws://127.0.0.1:8006/ws/music`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                setWsStatus(true);
                addLog("成功连接音乐推送后端");
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    // 匹配后端PlayMessage结构体 action
                    switch (msg.action) {
                        case "play":
                            loadAndPlay(msg.song_name, msg.song_path);
                            break;
                        case "stop":
                            audio.pause();
                            audio.currentTime = 0;
                            songNameEl.textContent = "已全局停止";
                            addLog("收到后端全局停止指令");
                            statusText.textContent = "全局播放已终止";
                            break;
                        default:
                            addLog(`未知指令：${msg.action}`);
                    }
                } catch (parseErr) {
                    addLog(`消息解析异常：${parseErr.message}`);
                }
            };

            ws.onclose = () => {
                setWsStatus(false);
                addLog("连接丢失，3秒后自动重连");
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = () => {
                addLog("WebSocket连接发生错误");
            };
        }

        // 页面初始化启动连接
        window.onload = () => {
            addLog("正在连接音乐推送服务...");
            connectWebSocket();
        };

        // 页面关闭清理播放器，不上报后端
        window.onbeforeunload = () => {
            audio.pause();
        };
    </script>
</body>
</html>
